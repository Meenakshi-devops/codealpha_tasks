<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="task2.css">
</head>

<body>
    <div class="container">
        <div class="Calculator" id="containers">
            <input type="text" placeholder="0" id="Output-Screen">
            <button onclick="clearscreen()">CL</button>
            <button onclick="del()">DEL</button>
            <button onclick="display('%')">%</button>
            <button onclick="display('÷')">÷</button>
            <button onclick="display('7')">7</button>
            <button onclick="display('8')">8</button>
            <button onclick="display('9')">9</button>
            <button onclick="display('x')">x</button>
            <button onclick="display('4')">4</button>
            <button onclick="display('5')">5</button>
            <button onclick="display('6')">6</button>
            <button onclick="display('-')">-</button>
            <button onclick="display('1')">1</button>
            <button onclick="display('2')">2</button>
            <button onclick="display('3')">3</button>
            <button onclick="display('.')">.</button>
            <button onclick="display('+')">+</button>
            <button onclick="display('0')">0</button>
            <button onclick="calculate()" id="equal">=</button>



        </div>
    </div>
    <button onclick="change()" id="changebutton">change my color</button>
    <script>
        let outputonScreen = document.getElementById("Output-Screen");
        let shouldClear = false;
        document.addEventListener("keydown", function (e) {
            if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
                display(e.key);
            } else if (e.key === "Enter") {
                calculate();
            } else if (e.key === "Backspace") {
                del();
            } else if (e.key === "Escape") {
                clearscreen();
            }
        });


        function display(num) {
            if (outputonScreen.value === "0") {
                outputonScreen.value = num;   // replace 0
            } else {
                outputonScreen.value += num;  // append normally
            }
        }
        function calculate() {
            try {
                let expression = outputonScreen.value
                    .replace(/÷/g, '/')
                    .replace(/x/g, '*');

                outputonScreen.value = eval(expression);
            } catch {
                alert("Invalid input");
            }
        }
        function del() {
            outputonScreen.value = outputonScreen.value.slice(0, -1);
        }
        function clearscreen() {
            outputonScreen.value = "0";
        }

        function change() {
            document.getElementById("containers").classList.toggle("dark");
            document.getElementById("changebutton").classList.toggle("dark");
        }



    </script>

</body>

</html>
